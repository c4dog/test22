<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테런 염색 값 변환기 (Fixed Magnifier)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, sans-serif;
            background: var(--bg); color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px; margin: 0; line-height: 1.5;
        }

        .container { 
            max-width: 1000px; width: 100%; background: var(--card); 
            padding: 32px; border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); 
        }

        h2 { font-size: 1.75rem; font-weight: 800; margin: 0 0 24px 0; text-align: center; letter-spacing: -0.02em; }

        /* 업로드 및 캔버스 영역 */
        .upload-area { 
            border: 2px dashed #e2e8f0; border-radius: 16px; padding: 40px 20px; 
            text-align: center; cursor: pointer; margin-bottom: 24px; 
            transition: all 0.2s ease; background: #fafafa;
        }

        #canvas-container { 
            position: relative; border-radius: 12px; border: 1px solid #e2e8f0; 
            display: none; cursor: crosshair; margin-bottom: 24px; overflow: hidden; background: #000;
            max-height: 600px; overflow: auto;
        }
        canvas { display: block; margin: 0 auto; }

        /* 결과창 레이아웃 */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }

        .result-card { background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid #f1f5f9; }
        .result-card h3 { margin: 0 0 12px 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-sub); }

        /* 고정형 돋보기 스타일 */
        #fixed-magnifier-box {
            width: 100%; height: 180px; background: #000; border-radius: 12px;
            margin-bottom: 16px; overflow: hidden; position: relative;
            border: 1px solid #e2e8f0;
        }
        #zoom-canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

        .input-group { margin-bottom: 12px; }
        .input-label { font-size: 0.75rem; font-weight: 600; color: var(--text-sub); display: block; margin-bottom: 4px; }
        .inputs-row { display: flex; gap: 8px; align-items: center; }
        
        input {
            width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px;
            font-family: inherit; font-size: 0.9rem; font-weight: 600; text-align: center;
        }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }
        
        .color-preview { width: 100%; height: 40px; border-radius: 8px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.05); }

        /* 테런 전용 스타일 */
        .tr-special { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); border: none; color: white; display: flex; flex-direction: column; justify-content: center; }
        .tr-special h3 { color: rgba(255,255,255,0.8); }
        .tr-list { display: flex; flex-direction: column; gap: 12px; font-weight: 800; }
        .tr-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 6px; }
        .tr-val { font-size: 1.5rem; }

        button { 
            background: var(--primary); color: white; border: none; padding: 12px 24px; 
            border-radius: 10px; cursor: pointer; font-weight: 600; font-family: inherit; transition: transform 0.1s ease;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>테런 염색 값 변환기</h2>
    
    <div id="drop-zone" class="upload-area">
        <p style="font-size: 1.125rem; font-weight: 700;">이미지를 드래그하거나 Ctrl+V 하세요</p>
        <input type="file" id="file-input" class="hidden" accept="image/*">
        <button onclick="document.getElementById('file-input').click()" style="margin-top:10px;">파일 선택</button>
    </div>

    <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
    </div>

    <div class="results-grid">
        <div class="result-card">
            <h3>정밀 확대 및 입력</h3>
            <div id="fixed-magnifier-box">
                <canvas id="zoom-canvas"></canvas>
            </div>
            <div id="preview-box" class="color-preview" style="background-color: #000000;"></div>
            <div class="input-group">
                <span class="input-label">HEX Code</span>
                <input type="text" id="in-hex" value="#000000" maxlength="7">
            </div>
            <div class="inputs-row">
                <div><span class="input-label">R</span><input type="number" id="in-r" value="0" max="255"></div>
                <div><span class="input-label">G</span><input type="number" id="in-g" value="0" max="255"></div>
                <div><span class="input-label">B</span><input type="number" id="in-b" value="0" max="255"></div>
            </div>
        </div>

        <div class="result-card">
            <h3>HSV 표준 데이터</h3>
            <div style="height: 120px; display: flex; align-items: center; justify-content: center; color: var(--text-sub); font-size: 0.85rem; text-align: center; border: 1px solid #f1f5f9; border-radius: 8px; margin-bottom: 20px; background: #fff;">
                마우스가 가리키는 곳이<br>좌측 상단 돋보기에 표시됩니다.
            </div>
            <div class="inputs-row">
                <div><span class="input-label">H (0~360)</span><input type="number" id="in-h" value="0"></div>
                <div><span class="input-label">S (0~100)</span><input type="number" id="in-s" value="0"></div>
                <div><span class="input-label">V (0~100)</span><input type="number" id="in-v" value="0"></div>
            </div>
        </div>

        <div class="result-card tr-special">
            <h3>테일즈런너 입력값</h3>
            <div class="tr-list">
                <div class="tr-item"><span>색상 (Hue)</span> <span class="tr-val" id="tr-h">0</span></div>
                <div class="tr-item"><span>채도 (Saturation)</span> <span class="tr-val" id="tr-s">0</span></div>
                <div class="tr-item"><span>명도 (Value)</span> <span class="tr-val" id="tr-v">0</span></div>
            </div>
        </div>
    </div>
    
    <button id="re-upload" class="hidden" style="margin-top:24px; width:100%; background:#475569">다른 이미지로 교체하기</button>
</div>

<script>
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const container = document.getElementById('canvas-container');
const zoomCanvas = document.getElementById('zoom-canvas');
const zCtx = zoomCanvas.getContext('2d');
const reUploadBtn = document.getElementById('re-upload');

const inputs = {
    hex: document.getElementById('in-hex'),
    r: document.getElementById('in-r'), g: document.getElementById('in-g'), b: document.getElementById('in-b'),
    h: document.getElementById('in-h'), s: document.getElementById('in-s'), v: document.getElementById('in-v')
};

// --- 무한 드래그 앤 드롭 및 브라우저 가로채기 방지 ---
window.addEventListener("dragover", e => e.preventDefault(), false);
window.addEventListener("drop", e => e.preventDefault(), false);

const handleDrop = (e) => {
    e.preventDefault();
    e.stopPropagation();
    const dt = e.dataTransfer;
    const files = dt.files;
    if (files && files[0]) {
        const reader = new FileReader();
        reader.onload = event => loadImage(event.target.result);
        reader.readAsDataURL(files[0]);
    }
};

['dragenter', 'dragover'].forEach(name => {
    dropZone.addEventListener(name, () => {
        dropZone.style.borderColor = 'var(--primary)';
        dropZone.style.background = 'var(--primary-light)';
    });
});

['dragleave', 'drop'].forEach(name => {
    dropZone.addEventListener(name, () => {
        dropZone.style.borderColor = '#e2e8f0';
        dropZone.style.background = '#fafafa';
    });
});

dropZone.addEventListener('drop', handleDrop, false);
container.addEventListener('drop', handleDrop, false);

// --- 핵심 로직 ---
function rgbToHsv(r, g, b) {
    r /= 255, g /= 255, b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, v = max;
    const d = max - min;
    s = max === 0 ? 0 : d / max;
    if (max === min) h = 0;
    else {
        switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
    }
    return { h: h * 360, s: s * 100, v: v * 100 };
}

function hsvToRgb(h, s, v) {
    h /= 360; s /= 100; v /= 100;
    let r, g, b, i = Math.floor(h * 6), f = h * 6 - i, p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
    switch (i % 6) {
        case 0: r = v, g = t, b = p; break;
        case 1: r = q, g = v, b = p; break;
        case 2: r = p, g = v, b = t; break;
        case 3: r = p, g = q, b = v; break;
        case 4: r = t, g = p, b = v; break;
        case 5: r = v, g = p, b = q; break;
    }
    return { r: Math.round(r * 255), g: Math.round(g * 255), b: Math.round(b * 255) };
}

function updateUI(r, g, b, h, s, v, origin) {
    const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
    if (origin !== 'hex') inputs.hex.value = hex;
    if (origin !== 'rgb') { inputs.r.value = r; inputs.g.value = g; inputs.b.value = b; }
    if (origin !== 'hsv') { inputs.h.value = Math.round(h); inputs.s.value = Math.round(s); inputs.v.value = Math.round(v); }
    document.getElementById('preview-box').style.backgroundColor = hex;
    document.getElementById('tr-h').innerText = Math.round(h * 1.42);
    document.getElementById('tr-s').innerText = Math.round(s * 5.12);
    document.getElementById('tr-v').innerText = Math.round(v * 5.12);
}

function loadImage(source) {
    let img = new Image();
    img.onload = () => {
        canvas.width = img.width; canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        dropZone.classList.add('hidden'); container.style.display = 'block';
        reUploadBtn.classList.remove('hidden');
    };
    img.src = source;
}

// 입력 이벤트 연동
inputs.hex.addEventListener('input', () => {
    let val = inputs.hex.value;
    if (!val.startsWith('#')) { val = '#' + val; inputs.hex.value = val; }
    if (val.length === 7) {
        const r = parseInt(val.slice(1, 3), 16), g = parseInt(val.slice(3, 5), 16), b = parseInt(val.slice(5, 7), 16);
        if (!isNaN(r)) updateUI(r, g, b, ...Object.values(rgbToHsv(r, g, b)), 'hex');
    }
});

[inputs.r, inputs.g, inputs.b].forEach(el => el.addEventListener('input', () => {
    const r = +inputs.r.value, g = +inputs.g.value, b = +inputs.b.value;
    updateUI(r, g, b, ...Object.values(rgbToHsv(r, g, b)), 'rgb');
}));

[inputs.h, inputs.s, inputs.v].forEach(el => el.addEventListener('input', () => {
    const h = +inputs.h.value, s = +inputs.s.value, v = +inputs.v.value;
    const rgb = hsvToRgb(h, s, v);
    updateUI(rgb.r, rgb.g, rgb.b, h, s, v, 'hsv');
}));

// 마우스 및 클릭 이벤트 (고정 돋보기 적용)
container.onmousemove = e => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    
    // 고정 돋보기 캔버스 업데이트
    zoomCanvas.width = 150; zoomCanvas.height = 150;
    zCtx.imageSmoothingEnabled = false;
    zCtx.drawImage(canvas, x - 10, y - 10, 20, 20, 0, 0, 150, 150);
    zCtx.strokeStyle = 'white'; zCtx.lineWidth = 2; zCtx.strokeRect(70, 70, 10, 10);
};

container.onclick = e => {
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
    const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
    const p = ctx.getImageData(x, y, 1, 1).data;
    updateUI(p[0], p[1], p[2], ...Object.values(rgbToHsv(p[0], p[1], p[2])));
};

// 기타 버튼 및 붙여넣기
fileInput.onchange = e => {
    const f = e.target.files[0];
    if (f) { const r = new FileReader(); r.onload = ev => loadImage(ev.target.result); r.readAsDataURL(f); }
};

window.onpaste = e => {
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
            const blob = items[i].getAsFile();
            const r = new FileReader(); r.onload = ev => loadImage(ev.target.result); r.readAsDataURL(blob);
        }
    }
};

reUploadBtn.onclick = () => {
    dropZone.classList.remove('hidden'); container.style.display = 'none';
    reUploadBtn.classList.add('hidden'); fileInput.value = '';
};
</script>
</body>
</html>
